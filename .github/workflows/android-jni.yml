name: Android JNI release assets

on:
  workflow_dispatch:
  push:
    tags:
      - "android-jni-*"

permissions:
  contents: write

jobs:
  android-jni-release-assets:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake cmake curl git libtool make ninja-build pkg-config rsync unzip zip

      - name: Build Android JNI libraries
        run: android/build-android-jni-assets.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mosh-android-jni-release-assets
          path: build/android-jni/mosh-android-jni-*.zip

      - name: Upload GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: build/android-jni/mosh-android-jni-*.zip
